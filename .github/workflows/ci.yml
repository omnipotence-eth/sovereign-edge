name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uvx ty check packages/ agents/ services/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync --all-packages
      # Exit code 5 = no tests collected (expected during Phase 1 skeleton)
      - run: uv run pytest packages/ agents/ services/ -v --tb=short || [ $? -eq 5 ]

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - run: uv sync --all-packages
      - run: uv run bandit -r packages/ agents/ services/ -c pyproject.toml
      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
