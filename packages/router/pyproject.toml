[project]
name = "sovereign-edge-router"
version = "0.3.0"
requires-python = ">=3.11"
dependencies = [
    "onnxruntime>=1.18,<2.0",
    "numpy>=1.26,<3.0",
    "transformers>=4.44,<5.0",
    "sovereign-edge-core",
]

[tool.uv.sources]
sovereign-edge-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/router"]
