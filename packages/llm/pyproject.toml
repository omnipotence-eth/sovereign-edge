[project]
name = "sovereign-edge-llm"
version = "0.3.0"
requires-python = ">=3.11"
dependencies = [
    "litellm>=1.44,<2.0",
    "tenacity>=8.5,<9.0",
    "sovereign-edge-core",
]

[tool.uv.sources]
sovereign-edge-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/llm"]
